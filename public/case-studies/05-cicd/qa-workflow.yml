name: qa-checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run lint

  e2e:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run test:e2e

  deploy-preview:
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - run: echo "preview deploy"
